<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acne Advisor AI</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        textarea {
            scrollbar-width: thin;
        }
        /* Custom details marker styling */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function generateId() {
            return Math.random().toString(36).substring(2, 11);
        }

        function App() {
            // State initialization from localStorage
            const [sessions, setSessions] = useState(() => {
                const saved = localStorage.getItem('acneAdvisorSessions');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // Migrate old sessions to include hidden and updatedAt
                    return parsed.map(s => ({
                        ...s,
                        hidden: s.hidden || false,
                        updatedAt: s.updatedAt || s.createdAt || Date.now()
                    }));
                }
                return [];
            });
            const [activeSessionId, setActiveSessionId] = useState(() => {
                const saved = localStorage.getItem('acneAdvisorActiveSession');
                return saved || null;
            });
            
            const [message, setMessage] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [menuOpenForId, setMenuOpenForId] = useState(null); // ID of session whose menu is open
            
            const messagesEndRef = useRef(null);
            const textareaRef = useRef(null);

            // Close menu when clicking outside could be handled by a global listener, but for simplicity we'll just handle it where needed

            // Save to localStorage whenever sessions change
            useEffect(() => {
                localStorage.setItem('acneAdvisorSessions', JSON.stringify(sessions));
            }, [sessions]);

            // Save active session
            useEffect(() => {
                if (activeSessionId) {
                    localStorage.setItem('acneAdvisorActiveSession', activeSessionId);
                } else {
                    localStorage.removeItem('acneAdvisorActiveSession');
                }
            }, [activeSessionId]);

            // Derived state
            const activeSession = sessions.find(s => s.id === activeSessionId) || null;
            const chatHistory = activeSession ? activeSession.messages : [];

            // Scroll to bottom
            const scrollToBottom = () => {
                if (messagesEndRef.current) {
                    messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
                }
            };

            useEffect(() => {
                scrollToBottom();
            }, [chatHistory, isLoading]);

            // Auto-resize textarea
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = "auto";
                    textareaRef.current.style.height = `${Math.min(textareaRef.current.scrollHeight, 200)}px`;
                }
            }, [message]);

            // Handle actions
            const handleNewChat = () => {
                setActiveSessionId(null);
                setError(null);
                setMessage("");
                if (textareaRef.current) textareaRef.current.style.height = "auto";
            };

            const handleSelectSession = (id) => {
                setActiveSessionId(id);
                setError(null);
                if (window.innerWidth < 768) {
                    setSidebarOpen(false); // Close sidebar on mobile
                }
            };

            const handleRenameSession = (e, id) => {
                e.stopPropagation();
                setMenuOpenForId(null);
                const sessionToRename = sessions.find(s => s.id === id);
                if (!sessionToRename) return;
                
                const newTitle = prompt("Nhập tên mới cho đoạn chat:", sessionToRename.title);
                if (newTitle && newTitle.trim()) {
                    setSessions(prev => prev.map(s => s.id === id ? { ...s, title: newTitle.trim(), updatedAt: Date.now() } : s));
                }
            };

            const handleHideSession = (e, id) => {
                e.stopPropagation();
                setMenuOpenForId(null);
                setSessions(prev => prev.map(s => s.id === id ? { ...s, hidden: true, updatedAt: Date.now() } : s));
                
                // If the hidden session was active, find another one
                if (activeSessionId === id) {
                    const remaining = sessions.filter(s => s.id !== id && !s.hidden).sort((a, b) => b.updatedAt - a.updatedAt);
                    setActiveSessionId(remaining.length > 0 ? remaining[0].id : null);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSubmit(e);
                }
            };

            const sendQuestion = async (userMessageText) => {
                if (!userMessageText.trim() || isLoading) return;
                
                setError(null);
                setIsLoading(true);

                let currentSessionId = activeSessionId;
                
                // Create new session if none is active
                if (!currentSessionId) {
                    currentSessionId = generateId();
                    const title = userMessageText.length > 40 ? userMessageText.substring(0, 40) + "..." : userMessageText;
                    const newSession = {
                        id: currentSessionId,
                        title: title,
                        createdAt: Date.now(),
                        messages: []
                    };
                    // Use callback form to ensure we don't have race conditions with React state
                    setSessions(prev => [newSession, ...prev]);
                    setActiveSessionId(currentSessionId);
                }

                // Add user message
                const userMsgObj = { role: "user", content: userMessageText };
                setSessions(prev => prev.map(s => {
                    if (s.id === currentSessionId) {
                        return { ...s, messages: [...s.messages, userMsgObj], updatedAt: Date.now() };
                    }
                    return s;
                }));
                // Compile conversation history
                // We need the messages BEFORE this user message was added.
                const currentSessionObj = sessions.find(s => s.id === currentSessionId) || { messages: [] };
                const history = currentSessionObj.messages
                    .slice(-6) // get up to last 6 messages
                    .map(m => ({ role: m.role, content: m.content }));

                try {
                    const response = await fetch("http://127.0.0.1:8000/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            message: userMessageText,
                            session_id: currentSessionId,
                            conversation_history: history
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Lỗi server: ${response.status}`);
                    }

                    const data = await response.json();
                    
                    // Add assistant message
                    const astMsgObj = { role: "assistant", content: data.answer, data: data };
                    setSessions(prev => prev.map(s => {
                        if (s.id === currentSessionId) {
                            return { ...s, messages: [...s.messages, astMsgObj] };
                        }
                        return s;
                    }));
                    
                } catch (err) {
                    setError("Không kết nối được backend. Hãy kiểm tra FastAPI tại http://127.0.0.1:8000");
                    console.error(err);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSubmit = async (e) => {
                if (e) e.preventDefault();
                const textToSubmit = message;
                setMessage("");
                if (textareaRef.current) textareaRef.current.style.height = "auto";
                await sendQuestion(textToSubmit);
            };

            // Formatting simple markdown-like text safely
            const formatText = (text) => {
                if (!text) return "";
                return text.split('\n').map((line, i) => {
                    if (line.startsWith('*   **') || line.startsWith('-   **')) {
                        const parts = line.split('**');
                        return <li key={i} className="ml-5 list-disc mt-1"><strong>{parts[1]}</strong>{parts.slice(2).join('**')}</li>;
                    }
                    if (line.startsWith('*   ') || line.startsWith('-   ')) return <li key={i} className="ml-5 list-disc mt-1">{line.substring(4)}</li>;
                    if (line.startsWith('**')) {
                        const parts = line.split('**');
                        return <p key={i} className="mt-3 mb-1"><strong>{parts[1]}</strong>{parts.slice(2).join('**')}</p>;
                    }
                    if (line.trim() === '') return <div key={i} className="h-3"></div>;
                    return <p key={i} className="mt-1">{line}</p>;
                });
            };

            const suggestedQuestions = [
                "Tôi bị mụn viêm đỏ ở má, có nên dùng benzoyl peroxide không?",
                "Mụn đầu đen nên chăm sóc như thế nào?",
                "Khi nào mụn cần đi khám bác sĩ da liễu?"
            ];

            return (
                <div className="flex h-screen bg-white text-gray-800 font-sans overflow-hidden">
                    {/* Sidebar */}
                    <div className={`fixed md:relative z-20 flex-shrink-0 bg-gray-50 border-r border-gray-200 transition-all duration-300 ease-in-out h-full flex flex-col ${sidebarOpen ? 'w-[260px]' : 'w-0 overflow-hidden border-none'}`}>
                        {/* App Title & Subtitle */}
                        <div className="p-4 w-[260px] flex-shrink-0 border-b border-gray-200">
                            <h1 className="font-bold text-lg text-gray-800">Acne Advisor AI</h1>
                            <p className="text-[11px] text-gray-500 mt-1 leading-snug">Thông tin tham khảo, không thay thế bác sĩ da liễu</p>
                        </div>
                        
                        <div className="p-3 w-[260px] flex-shrink-0 mt-1">
                            <button 
                                onClick={handleNewChat}
                                className="w-full flex items-center gap-2 p-3 text-sm font-medium rounded-lg border border-gray-300 hover:bg-gray-100 transition-colors bg-white text-gray-700 shadow-sm"
                            >
                                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>
                                Đoạn chat mới
                            </button>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-3 w-[260px]">
                            <div className="text-xs font-semibold text-gray-500 mb-2 px-2">Lịch sử chat</div>
                            <div className="space-y-1 pb-10">
                                {sessions.filter(s => !s.hidden).sort((a, b) => b.updatedAt - a.updatedAt).map(session => (
                                    <div key={session.id} className="relative group">
                                        <button 
                                            onClick={() => handleSelectSession(session.id)}
                                            className={`w-full text-left pl-3 pr-8 py-3 rounded-lg text-sm truncate transition-colors ${activeSessionId === session.id ? 'bg-gray-200 font-medium' : 'hover:bg-gray-100 text-gray-600'}`}
                                            title={session.title}
                                        >
                                            {session.title}
                                        </button>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); setMenuOpenForId(menuOpenForId === session.id ? null : session.id); }}
                                            className={`absolute right-1 top-1/2 -translate-y-1/2 p-1.5 rounded-md text-gray-500 hover:text-gray-800 hover:bg-gray-300 transition-colors ${menuOpenForId === session.id || activeSessionId === session.id ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}
                                            title="Tùy chọn"
                                        >
                                            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z"/></svg>
                                        </button>
                                        
                                        {menuOpenForId === session.id && (
                                            <div className="absolute right-0 top-full mt-1 w-40 bg-white border border-gray-200 rounded-md shadow-lg z-50 py-1" onMouseLeave={() => setMenuOpenForId(null)}>
                                                <button 
                                                    onClick={(e) => handleRenameSession(e, session.id)}
                                                    className="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 flex items-center gap-2"
                                                >
                                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                                                    Đổi tên
                                                </button>
                                                <button 
                                                    onClick={(e) => handleHideSession(e, session.id)}
                                                    className="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100 flex items-center gap-2"
                                                >
                                                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                                                    Ẩn khỏi lịch sử
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                {sessions.filter(s => !s.hidden).length === 0 && (
                                    <div className="text-sm text-gray-400 px-2 py-4 italic">Chưa có lịch sử chat</div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Main Chat Area */}
                    <div className="flex-1 flex flex-col h-full relative max-w-full bg-white">
                        {/* Header */}
                        <header className="h-14 flex items-center px-4 text-gray-700 flex-shrink-0 relative z-10 bg-white">
                            <button 
                                onClick={() => setSidebarOpen(!sidebarOpen)}
                                className="p-2 -ml-2 mr-2 rounded-md hover:bg-gray-100 text-gray-500"
                                title="Ẩn/Hiện lịch sử"
                            >
                                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16"/>
                                </svg>
                            </button>
                            <div className="flex flex-col flex-1 truncate">
                                <h1 className="font-semibold text-[15px] text-gray-800 truncate">{activeSession ? activeSession.title : "Đoạn chat mới"}</h1>
                            </div>
                        </header>

                        {/* Chat Scrollable Area */}
                        <div className="flex-1 overflow-y-auto">
                            {chatHistory.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center p-6 text-center max-w-2xl mx-auto">
                                    <div className="w-16 h-16 bg-gray-50 text-gray-600 border border-gray-200 rounded-full flex items-center justify-center mb-6">
                                        <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                                    </div>
                                    <h2 className="text-2xl font-medium mb-8 text-gray-800">Tôi có thể giúp gì cho tình trạng mụn của bạn?</h2>
                                    
                                    <div className="grid grid-cols-1 gap-3 w-full max-w-lg mx-auto">
                                        {suggestedQuestions.map((q, i) => (
                                            <button 
                                                key={i}
                                                onClick={() => sendQuestion(q)}
                                                className="text-left p-4 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors text-sm text-gray-600"
                                            >
                                                {q}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="pb-36 pt-2">
                                    {chatHistory.map((msg, index) => (
                                        <div key={index} className="py-6 px-4 md:px-0">
                                            <div className="max-w-3xl mx-auto flex gap-4 md:gap-6">
                                                <div className="flex-shrink-0 mt-1">
                                                    {msg.role === 'user' ? (
                                                        <div className="w-8 h-8 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-gray-600 font-bold">U</div>
                                                    ) : (
                                                        <div className="w-8 h-8 rounded-full bg-green-600 flex items-center justify-center text-white shadow-sm">
                                                            <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                                        </div>
                                                    )}
                                                </div>
                                                <div className="min-w-0 flex-1 overflow-hidden">
                                                    {msg.role === 'user' ? (
                                                        <div className="text-gray-800 text-[15px] md:text-base leading-relaxed whitespace-pre-wrap font-medium">{msg.content}</div>
                                                    ) : (
                                                        <div className="text-gray-800 text-[15px] md:text-base leading-relaxed">
                                                            <div className="space-y-1">{formatText(msg.content)}</div>
                                                            
                                                            {msg.data && (
                                                                <div className="mt-6 flex flex-col gap-3">
                                                                    {/* Symptoms */}
                                                                    {msg.data.symptoms && msg.data.symptoms.length > 0 && (
                                                                        <div className="flex flex-wrap gap-2 items-center">
                                                                            {msg.data.symptoms.map((s, i) => (
                                                                                <span key={i} className="px-2 py-1 bg-gray-100 text-gray-600 text-xs font-medium rounded-md border border-gray-200">{s}</span>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                    
                                                                    {/* Safety Flags */}
                                                                    {msg.data.safety_flags && msg.data.safety_flags.length > 0 && (
                                                                        <div className="bg-yellow-50 p-3 rounded-md border border-yellow-200 text-yellow-800 text-sm flex gap-2 items-start mt-1">
                                                                            <svg className="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                                                                            <div><strong>Lưu ý:</strong> {msg.data.safety_flags.join(' ')}</div>
                                                                        </div>
                                                                    )}

                                                                    {/* Graph Facts */}
                                                                    {msg.data.graph_facts && msg.data.graph_facts.length > 0 && (
                                                                        <details className="group mt-2 text-sm border border-gray-200 rounded-lg overflow-hidden bg-white max-w-xl">
                                                                            <summary className="p-2.5 bg-white cursor-pointer font-medium text-gray-600 hover:bg-gray-50 flex items-center select-none text-xs">
                                                                                <svg className="w-4 h-4 mr-2 transition-transform group-open:rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"/></svg>
                                                                                Dữ liệu kỹ thuật / Debug ({msg.data.graph_facts.length})
                                                                            </summary>
                                                                            <div className="p-3 border-t border-gray-200 text-gray-600 text-xs font-mono bg-gray-50 overflow-x-auto">
                                                                                <p className="italic text-[10px] text-gray-400 mb-3">* Phần này dùng để kiểm tra truy xuất tri thức, không phải hướng dẫn điều trị.</p>
                                                                                <div className="space-y-2">
                                                                                    {msg.data.graph_facts.map((fact, i) => (
                                                                                        <div key={i} className="pb-2 border-b border-gray-200 last:border-0 last:pb-0">
                                                                                            <span className="text-blue-600">{fact.entity}</span>
                                                                                            <span className="text-gray-400 mx-2">-[{fact.relationship}]-></span>
                                                                                            <span className="text-green-600">{fact.related_entity}</span>
                                                                                            {fact.description && <div className="mt-1 pl-3 border-l-2 border-gray-300 text-gray-500 italic whitespace-normal font-sans">"{fact.description}"</div>}
                                                                                        </div>
                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        </details>
                                                                    )}

                                                                    {/* Sources and Meta */}
                                                                    <div className="mt-1 text-xs text-gray-400 flex flex-wrap gap-x-4 gap-y-1">
                                                                        {msg.data.sources && msg.data.sources.length > 0 && (
                                                                            <div>
                                                                                <span className="font-medium">Nguồn: </span>
                                                                                {msg.data.sources.join(', ')}
                                                                            </div>
                                                                        )}
                                                                        {msg.data.metadata && (
                                                                            <div className="font-mono flex flex-wrap gap-3 items-center">
                                                                                <span title="Mô hình ngôn ngữ">⚡ {msg.data.metadata.model}</span>
                                                                                <span title="Phương pháp truy xuất">🔍 {msg.data.metadata.retrieval}</span>
                                                                                {msg.data.metadata.guardrail === "out_of_domain" && (
                                                                                    <span className="bg-red-100 text-red-700 px-2 py-0.5 rounded-full text-[10px] font-sans font-medium uppercase tracking-wider border border-red-200" title="Ngoài phạm vi hỗ trợ">Ngoài lề</span>
                                                                                )}
                                                                                {msg.data.metadata.guardrail === "partial_out_of_domain" && (
                                                                                    <span className="bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full text-[10px] font-sans font-medium uppercase tracking-wider border border-orange-200" title="Đã lọc một phần ngoài lề">Lọc ngoài lề</span>
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}

                                    {isLoading && (
                                        <div className="py-6 px-4 md:px-0">
                                            <div className="max-w-3xl mx-auto flex gap-4 md:gap-6">
                                                <div className="flex-shrink-0 mt-1">
                                                    <div className="w-8 h-8 rounded-full bg-green-600 flex items-center justify-center text-white shadow-sm">
                                                        <svg className="w-5 h-5 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                                    </div>
                                                </div>
                                                <div className="min-w-0 flex-1 flex items-center h-8">
                                                    <div className="flex space-x-1">
                                                        <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce"></div>
                                                        <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{animationDelay:'0.15s'}}></div>
                                                        <div className="w-2 h-2 bg-gray-300 rounded-full animate-bounce" style={{animationDelay:'0.3s'}}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {error && (
                                        <div className="py-6 px-4 md:px-0">
                                            <div className="max-w-3xl mx-auto pl-12 md:pl-14">
                                                <div className="bg-red-50 p-4 border border-red-100 rounded-lg text-red-600 flex gap-3 text-sm">
                                                    <svg className="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                                    {error}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    
                                    <div ref={messagesEndRef} className="h-4"></div>
                                </div>
                            )}
                        </div>

                        {/* Input Fixed Bottom Area */}
                        <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent pt-8 pb-4">
                            <div className="max-w-3xl mx-auto px-4 md:px-0">
                                <form onSubmit={handleSubmit} className="relative flex items-end bg-white border border-gray-300 shadow-[0_0_15px_rgba(0,0,0,0.05)] rounded-2xl overflow-hidden focus-within:ring-1 focus-within:ring-gray-300 focus-within:border-gray-400 transition-all">
                                    <textarea
                                        ref={textareaRef}
                                        value={message}
                                        onChange={(e) => setMessage(e.target.value)}
                                        onKeyDown={handleKeyDown}
                                        placeholder="Hỏi về tình trạng mụn của bạn..."
                                        disabled={isLoading}
                                        className="w-full max-h-[200px] min-h-[56px] py-4 pl-4 pr-12 bg-transparent resize-none outline-none text-gray-800 disabled:opacity-50 text-[15px]"
                                        rows="1"
                                    ></textarea>
                                    <button
                                        type="submit"
                                        disabled={isLoading || !message.trim()}
                                        className={`absolute right-3 bottom-3 p-1.5 rounded-lg flex items-center justify-center transition-colors ${message.trim() && !isLoading ? 'bg-black text-white hover:bg-gray-800' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}`}
                                    >
                                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
                                    </button>
                                </form>
                                <div className="text-center mt-3 text-xs text-gray-400">
                                    Acne Advisor AI chỉ cung cấp thông tin tham khảo, không thay thế tư vấn y khoa chuyên nghiệp.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
