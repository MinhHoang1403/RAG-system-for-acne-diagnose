<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acne Advisor AI - Retired Legacy Web Shell</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    main {
      width: min(36rem, calc(100vw - 2rem));
      padding: 2rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      background: #fff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }
    code {
      padding: 0.125rem 0.25rem;
      border-radius: 0.25rem;
      background: #eef2ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Retired legacy web shell</h1>
    <p>
      This legacy standalone entrypoint is intentionally inert. The maintained
      Acne Advisor AI frontend lives in <code>src/frontend</code>.
    </p>
    <p>
      Start the current UI with <code>npm run dev</code> from
      <code>src/frontend</code> after the FastAPI backend is available.
    </p>
  </main>
</body>
</html>
