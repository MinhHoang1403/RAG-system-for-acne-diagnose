allowed_alias_collisions:
  - normalized_alias: benzoyl peroxide
    entity_keys:
      - active_ingredient:benzoyl_peroxide
      - drug_class:benzoyl_peroxide
    reason: Benzoyl peroxide is modeled as both an active ingredient and a mechanism-specific drug class for v1 compatibility.
  - normalized_alias: benzoyl_peroxide
    entity_keys:
      - active_ingredient:benzoyl_peroxide
      - drug_class:benzoyl_peroxide
    reason: Benzoyl peroxide is modeled as both an active ingredient and a mechanism-specific drug class for v1 compatibility.
  - normalized_alias: bpo
    entity_keys:
      - active_ingredient:benzoyl_peroxide
      - drug_class:benzoyl_peroxide
    reason: BPO alias intentionally resolves to both the ingredient and mechanism-specific class.
  - normalized_alias: bp
    entity_keys:
      - active_ingredient:benzoyl_peroxide
      - drug_class:benzoyl_peroxide
    reason: BP alias intentionally resolves to both the ingredient and mechanism-specific class.
  - normalized_alias: azelaic acid
    entity_keys:
      - active_ingredient:azelaic_acid
      - drug_class:azelaic_acid
    reason: Azelaic acid is modeled as both active ingredient and class to close an existing v1 relationship.
  - normalized_alias: azelaic_acid
    entity_keys:
      - active_ingredient:azelaic_acid
      - drug_class:azelaic_acid
    reason: Azelaic acid is modeled as both active ingredient and class to close an existing v1 relationship.

