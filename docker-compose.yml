# =============================================================================
# Docker Compose - Acne Advisor AI Local Backing Services
# Services: PostgreSQL · Neo4j · Qdrant · Redis
# =============================================================================
#
# Lưu ý:
# - Các service chỉ publish trên 127.0.0.1.
# - Dữ liệu được lưu trong các thư mục bind mount dưới ./data.
# - Không dùng `docker compose down -v` nếu không chủ động xóa dữ liệu.
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    container_name: acne_postgres
    restart: unless-stopped

    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"

    environment:
      POSTGRES_USER: "${POSTGRES_USER:-user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-acne_agent_db}"

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-acne_agent_db}
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:5@sha256:0b5d3ab6ec1b866890dbfb53bf4fe1cf039f9e03c96165599a403005b7e7bcc3
    container_name: acne_neo4j
    restart: unless-stopped

    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"

    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/password}"
      NEO4J_PLUGINS: '["apoc"]'

    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/plugins:/plugins

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          auth="$${NEO4J_AUTH}";
          user="$${auth%%/*}";
          pass="$${auth#*/}";
          echo "RETURN 1;" |
          cypher-shell
          -a bolt://localhost:7687
          -u "$${user}"
          -p "$${pass}"
          >/dev/null 2>&1
          || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.18.0@sha256:b3063c673f3973877c038eeecc392bad5011f072ee7892b56c9a8e204a3bdea9
    container_name: acne_qdrant
    restart: unless-stopped

    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"

    volumes:
      - ./data/qdrant:/qdrant/storage

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: acne_redis
    restart: unless-stopped

    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

    command:
      - redis-server
      - --appendonly
      - "yes"

    volumes:
      - ./data/redis_data:/data

    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli ping | grep -q PONG
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
